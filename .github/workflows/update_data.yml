name: Update Data

on:
  schedule: # Run every day at fixed time
    - cron: "13 16 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"


      - name: Script
        run: |
          mkdir -p ./cache
          ./update_data.sh --ignore_404 --aggressive
          git status

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          commit-message: Update CSV data
          title: Update CSV
          branch: auto/update-data
          delete-branch: true
          reviewers: itsapinhulk
